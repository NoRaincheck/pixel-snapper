[package]
name = "pixel-snapper"
version = "0.1.0"
edition = "2021"
description = "Snap pixels to a perfect grid - designed to fix messy pixel art generated by AI. Python bindings for: https://github.com/Hugo-Dz/spritefusion-pixel-snapper"
license = "MIT"
repository = "https://github.com/NoRaincheck/pixel-snapper"

[lib]
name = "pixel_snapper"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "pixel-snapper"
path = "src/main.rs"

[dependencies]
image = { version = "0.24", default-features = false, features = ["png", "jpeg"] }
rand = { version = "0.8", features = ["small_rng"] }
rand_distr = "0.4"
rand_chacha = "0.3"
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

# Native CLI dependencies
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = "1.10"

# WASM-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
getrandom = { version = "0.2", features = ["js"] }

[features]
default = ["cli"]
python = ["pyo3"]
cli = []
