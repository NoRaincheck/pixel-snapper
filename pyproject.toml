[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "pixel-snapper"
version = "0.1.0"
description = "Snap pixels to a perfect grid, designed to fix messy pixel art generated by AI. Based on original work: https://github.com/Hugo-Dz/spritefusion-pixel-snapper/tree/main"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = []
keywords = ["pixel-art", "image-processing", "grid", "snap", "quantize"]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Programming Language :: Rust",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Multimedia :: Graphics :: Graphics Conversion",
]

[project.urls]
Homepage = "https://github.com/NoRaincheck/pixel-snapper"
Repository = "https://github.com/NoRaincheck/pixel-snapper"

[project.scripts]
pixel-snapper = "pixel_snapper.cli:main"

[tool.maturin]
features = ["python"]
python-source = "python"
module-name = "pixel_snapper"

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "ruff>=0.15.18",
]
